<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon Client Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: #0C0C0C;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(170,67,255,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

.login-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  padding: 1rem;
}

.login-box {
  background: #161616;
  border: 1px solid #2A2A2A;
  border-radius: 20px;
  padding: 2.5rem 2rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.login-box::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(170,67,255,0.1) 0%, transparent 65%);
  pointer-events: none;
}

.login-logo {
  margin-bottom: 2rem;
}

.login-title {
  font-family: 'Unbounded', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  color: #F0EDE8;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.login-sub {
  font-size: 12px;
  color: #6B6865;
  font-weight: 300;
  margin-bottom: 2rem;
  line-height: 1.5;
}

.login-input-wrap {
  position: relative;
  margin-bottom: 12px;
}

.login-input {
  width: 100%;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: #F0EDE8;
  background: #1F1F1F;
  border: 1px solid #2A2A2A;
  border-radius: 10px;
  padding: 13px 46px 13px 16px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  letter-spacing: .06em;
}

.login-input:focus {
  border-color: #AA43FF;
  box-shadow: 0 0 0 3px rgba(170,67,255,0.12);
}

.login-input::placeholder {
  color: #4A4845;
  letter-spacing: 0;
}

.login-eye {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: #4A4845; cursor: pointer;
  font-size: 16px; padding: 0;
  transition: color .15s;
  line-height: 1;
}

.login-eye:hover { color: #AA43FF; }

.login-btn {
  width: 100%;
  font-family: 'Unbounded', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 14px;
  background: #AA43FF;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: all .2s;
  margin-top: 4px;
  position: relative;
  overflow: hidden;
}

.login-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity .2s;
}

.login-btn:hover {
  background: #9630E8;
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(170,67,255,0.35);
}

.login-btn:hover::after { opacity: 1; }
.login-btn:active { transform: none; box-shadow: none; }

.login-error {
  margin-top: 10px;
  font-size: 12px;
  color: #E05252;
  min-height: 18px;
  font-weight: 300;
  transition: opacity .2s;
}

.shake {
  animation: shake .4s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.login-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 1.5rem 0 1rem;
}
.login-divider::before, .login-divider::after {
  content: ''; flex: 1; height: 1px; background: #1F1F1F;
}
.login-divider span {
  font-size: 10px; color: #3A3835;
  text-transform: uppercase; letter-spacing: .08em;
}

.login-footer {
  font-size: 10px;
  color: #2A2826;
  letter-spacing: .06em;
  text-transform: uppercase;
}
</style>
</head>

    </div>
    <div class="login-title">Avalon Client Hub</div>
    <div class="login-sub">Ingresá la contraseña<br>para acceder a la plataforma</div>

    <div class="login-input-wrap">
      <input
        class="login-input"
        type="password"
        id="pass-input"
        placeholder="Contraseña de acceso"
        onkeydown="if(event.key==='Enter') checkPass()"
        autocomplete="current-password"
      >
      <button class="login-eye" onclick="togglePass()" id="eye-btn">👁</button>
    </div>

    <button class="login-btn" onclick="checkPass()">Ingresar →</button>
    <div class="login-error" id="login-error"></div>

    <div class="login-divider"><span>Avalon World Agency</span></div>
    <div class="login-footer">Plataforma de uso interno · 2026</div>
  </div>
</div>

<script>
const PASS = 'Avaloninterno2026';

function checkPass() {
  const val = document.getElementById('pass-input').value;
  const err = document.getElementById('login-error');
  const box = document.querySelector('.login-box');

  if (val === PASS) {
    sessionStorage.setItem('avalon_auth', '1');
    window.location.href = 'app.html';
  } else {
    err.textContent = 'Contraseña incorrecta. Intentá de nuevo.';
    document.getElementById('pass-input').value = '';
    box.classList.add('shake');
    setTimeout(() => { box.classList.remove('shake'); err.textContent = ''; }, 3000);
    document.getElementById('pass-input').focus();
  }
}

function togglePass() {
  const inp = document.getElementById('pass-input');
  const btn = document.getElementById('eye-btn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// Si ya está autenticado, ir directo a la app
if (sessionStorage.getItem('avalon_auth') === '1') {
  window.location.href = 'app.html';
}
</script>
